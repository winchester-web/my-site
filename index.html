<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>YSN AI</title>

<style>
body {
margin: 0;
font-family: Arial;
background: #0f0f0f;
color: white;
display: flex;
justify-content: center;
align-items: center;
height: 100vh;
}

.chat {
width: 350px;
height: 500px;
background: #1a1a1a;
border-radius: 15px;
display: flex;
flex-direction: column;
overflow: hidden;
}

.messages {
flex: 1;
padding: 10px;
overflow-y: auto;
}

.msg {
margin: 10px 0;
padding: 10px;
border-radius: 10px;
max-width: 70%;
}

.user {
background: white;
color: black;
align-self: flex-end;
}

.bot {
background: #333;
}

.inputBox {
display: flex;
}

input {
flex: 1;
padding: 10px;
border: none;
}

button {
padding: 10px;
border: none;
background: white;
cursor: pointer;
}
</style>
</head>

<body>

<div class="chat">
<div class="messages" id="messages"></div>

<div class="inputBox">
<input id="input" placeholder="Ask something...">
<button onclick="send()">Send</button>
</div>
</div>

<script>
function send() {
let input = document.getElementById("input");
let text = input.value;
if(!text) return;

addMessage(text, "user");
input.value = "";

setTimeout(() => {
let reply = generateReply(text);
typeMessage(reply);
}, 500);
}

function addMessage(text, type) {
let msg = document.createElement("div");
msg.className = "msg " + type;
msg.innerText = text;
document.getElementById("messages").appendChild(msg);
}

function typeMessage(text) {
let msg = document.createElement("div");
msg.className = "msg bot";
document.getElementById("messages").appendChild(msg);

let i = 0;
let interval = setInterval(() => {
msg.innerText += text[i];
i++;
if(i >= text.length) clearInterval(interval);
}, 30);
}

function generateReply(q) {
q = q.toLowerCase();

if(q.includes("hello")) return "Hey Yassine 😎";
if(q.includes("ai")) return "I am your smart AI 🤖";
if(q.includes("money")) return "Focus on skills, then money comes 💸";
if(q.includes("game")) return "Games are powerful 😏";
if(q.includes("who")) return "I am YSN AI, created by Yassine 🔥";

let random = [
"Interesting 🤔",
"Tell me more...",
"That’s smart 😏",
"I’m learning from you 😅"
];

return random[Math.floor(Math.random() * random.length)];
}
</script>

</body>
</html>
