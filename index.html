<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Twin Star</title>

<style>
html {
scroll-behavior: smooth;
}

body {
margin: 0;
font-family: Arial, sans-serif;
background: #fff;
color: #111;
}

/* Navbar */
header {
position: fixed;
width: 100%;
top: 0;
display: flex;
justify-content: space-between;
padding: 20px 40px;
background: rgba(255,255,255,0.9);
backdrop-filter: blur(10px);
}

.logo {
font-weight: bold;
font-size: 20px;
letter-spacing: 2px;
}

/* Hero */
.hero {
height: 100vh;
display: flex;
justify-content: center;
align-items: center;
flex-direction: column;
text-align: center;
}

.hero h1 {
font-size: 60px;
animation: fadeIn 1.5s ease;
}

.hero p {
color: #666;
}

.btn {
margin-top: 20px;
padding: 12px 30px;
border: 1px solid black;
text-decoration: none;
color: black;
transition: 0.3s;
}

.btn:hover {
background: black;
color: white;
}

/* Products */
.products {
padding: 100px 40px;
display: grid;
grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
gap: 25px;
}

.card {
transition: 0.3s;
}

.card:hover {
transform: translateY(-10px);
}

.card img {
width: 100%;
}

.card h3 {
margin: 10px 0 5px;
}

/* About */
.about {
padding: 100px 40px;
text-align: center;
background: #f5f5f5;
}

/* Footer */
footer {
text-align: center;
padding: 40px;
color: #777;
}

/* Animations */
@keyframes fadeIn {
from {opacity: 0; transform: translateY(30px);}
to {opacity: 1; transform: translateY(0);}
}
</style>
</head>

<body>

<header>
<div class="logo">TWIN STAR</div>
<div>Collection</div>
</header>

<section class="hero">
<h1>New Drop</h1>
<p>Minimal. Powerful. Different.</p>
<a href="#products" class="btn">Shop Now</a>
</section>

<section id="products" class="products">

<div class="card">
<img src="https://via.placeholder.com/300">
<h3>Black Tee</h3>
<p>50 DT</p>
</div>

<div class="card">
<img src="https://via.placeholder.com/300">
<h3>White Tee</h3>
<p>50 DT</p>
</div>

<div class="card">
<img src="https://via.placeholder.com/300">
<h3>Oversize Tee</h3>
<p>60 DT</p>
</div>

</section>

<section class="about">
<h2>About Twin Star</h2>
<p>We create simple and powerful streetwear.</p>
</section>

<footer>
<p>© 2026 Twin Star</p>
</footer>

</body>
</html>
