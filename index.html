<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>YSN AI Chatbot</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #0f0f0f;
            color: #E0E0E0;
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        .chat-container {
            width: 100%;
            max-width: 500px;
            height: 600px;
            background-color: #181818;
            border-radius: 20px;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.8);
            border: 1px solid #2a2a2a;
        }

        #messages {
            flex: 1;
            padding: 20px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 12px;
            scroll-behavior: smooth;
        }

        /* Custom Scrollbar */
        #messages::-webkit-scrollbar {
            width: 6px;
        }
        #messages::-webkit-scrollbar-thumb {
            background: #333;
            border-radius: 10px;
        }

        .message {
            padding: 12px 16px;
            border-radius: 15px;
            max-width: 75%;
            font-size: 15px;
            line-height: 1.4;
            animation: fadeIn 0.3s ease;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .user {
            background-color: #ffffff;
            color: #000;
            align-self: flex-end;
            border-bottom-right-radius: 2px;
            border-right: 3px solid #fc5c7d;
        }

        .bot {
            background-color: linear-gradient(135deg, #2a2a2a 0%, #1a1a1a 100%);
            color: #fff;
            align-self: flex-start;
            border-bottom-left-radius: 2px;
            border-left: 3px solid #6a82fb; /* Dean's Blue */
            box-shadow: 0 4px 15px rgba(0,0,0,0.3);
        }

        .typing-indicator {
            font-size: 13px;
            font-style: italic;
            color: #888;
            padding: 0 20px 10px;
            display: none;
        }

        .input-area {
            display: flex;
            padding: 15px;
            background-color: #111;
            gap: 10px;
        }

        #input {
            flex: 1;
            background-color: #222;
            border: 1px solid #333;
            border-radius: 10px;
            padding: 12px;
            color: white;
            outline: none;
        }

        #input:focus {
            border-color: #6a82fb;
        }

        #send {
            background: linear-gradient(135deg, #6a82fb, #fc5c7d);
            border: none;
            color: white;
            padding: 0 20px;
            border-radius: 10px;
            cursor: pointer;
            font-weight: bold;
            transition: transform 0.2s, filter 0.2s;
        }

        #send:hover {
            transform: scale(1.05);
            filter: brightness(1.1);
        }
    </style>
</head>
<body>
    <div class="input-area" style="display: flex; padding: 15px; background: #111;">
        <input type="text" id="input" placeholder="Ask something..." autocomplete="off" style="flex:1; padding: 10px; border-radius: 5px; border: none;">
        <button id="send" style="margin-left: 10px; padding: 10px 20px; border-radius: 5px; border: none; background: linear-gradient(135deg, #6a82fb, #fc5c7d); color: white; cursor: pointer;">Send</button>
    </div>
</div>
    <div class="chat-container">
        <div id="messages"></div>
        <div class="typing-indicator" id="typingIndicator">YSN AI is typing...</div>
          <div class="typing-indicator" id="typingIndicator">YSN AI is thinking...</div>
        <div class="input-area">
            <input type="text" id="input" placeholder="Ask something..." autocomplete="off">
            <button id="send">Send</button>
        </div>
    </div>

    <script>
        const messagesDiv = document.getElementById('messages');
        const inputField = document.getElementById('input');
        const sendButton = document.getElementById('send');
        const typingIndicator = document.getElementById('typingIndicator');

       
        // 1. Updated Knowledge Base
const botBrain = [
    {
        keys: ["who are you", "who are u", "who r u", "your name"], 
        answers: ["I am YSN AI, your digital assistant 🤖 . so how can i help you ? ", "The name's YSN AI. I'm here to answer your questions. So how can i help you ?"]
    },
    {
        keys: ["who is the best boxer"], 
        answers: ["Some say Tyson, some say Ali… but real ones know Yassine 😈🔥", "Legends exist, but Yassine is coming for the throne 👑🥊"]
    },
    {
        keys: ["hello", "hi", "hey"], 
        answers: ["Hey 😎", "Welcome back, champ 🔥"]
    },
    {
        keys: ["boxing"], 
        answers: ["Boxing is the strongest sport 🥊🔥", "Hard work beats talent when talent doesn't work hard."]
    },
    {
        keys: ["capital france"], 
        answers: ["Paris 180°C"] 
    },
    {
        keys: ["capital tunisia", "tunis"], 
        answers: ["Tunis 🇹🇳"]
    },
    {
        keys: ["love"], 
        answers: ["Focus on yourself and your goals first 🔥"]
    },
    {
        keys: ["money"], 
        answers: ["Focus on skills, money comes later 💸"]
    }
    {
        keys: ["my name is", "i am called"],
        answers: (input) => {
            const name = input.toLowerCase().split("is").pop().trim();
            userData.name = name;
            localStorage.setItem('userName', name);
            return `Got it! I'll remember that, ${name}. 😎`;
        }
    },
    {
        keys: ["supernatural", "dean winchester", "impala"],
        answers: ["Saving people, hunting things... the family business. 🔫🖤", "Dean Winchester: The man who loves pie and his '67 Impala. A true legend."]
    },
    {
        keys: ["the originals", "klaus mikaelson", "always and forever"],
        answers: ["I am the Hybrid! I can't be killed! 🐺🦇", "Always and Forever. Family is power. ⚜️🍷"]
    },
    {
        keys: ["who are you", "who are u"],
        answers: ["I am YSN AI. Part Winchester, part Mikaelson, and 100% your assistant. 🤖"]
    },
    {
        keys: ["time", "sa3a"],
        answers: () => `It is currently ${new Date().toLocaleTimeString()}. Time to be great. ⏳`
    }
];

        const defaultReplies = [
            "Interesting question 🤔",
            "Let me think about that...",
            "That depends on many things 😏",
            "You’re asking deep stuff 🔥"
        ];

        // 2. Logic
        function getResponse(input) {
            const query = input.toLowerCase();
            
            for (let item of botBrain) {
                for (let key of item.keys) {
                    if (query.includes(key)) {
                        return item.answers[Math.floor(Math.random() * item.answers.length)];
                    }
                }
            }
            return defaultReplies[Math.floor(Math.random() * defaultReplies.length)];
        }

        // 3. UI Functions
        function appendMessage(text, sender) {
            const messageDiv = document.createElement('div');
            messageDiv.className = 'message ' + sender;
            messageDiv.textContent = text;
            messagesDiv.appendChild(messageDiv);
            messagesDiv.scrollTop = messagesDiv.scrollHeight;
        }

        function handleSend() {
            const text = inputField.value.trim();
            if (!text) return;

            appendMessage(text, 'user');
            inputField.value = '';

            // Show typing indicator
            typingIndicator.style.display = 'block';
            messagesDiv.scrollTop = messagesDiv.scrollHeight;

            // Simulate AI "thinking"
            setTimeout(() => {
                typingIndicator.style.display = 'none';
                const reply = getResponse(text);
                appendMessage(reply, 'bot');
            }, 1000 + Math.random() * 1000);
        }

        // 4. Events
        sendButton.addEventListener('click', handleSend);
        inputField.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') handleSend();
        });

        // Initial Greeting
        setTimeout(() => {
            appendMessage("Welcome to YSN AI. What's on your mind?", "bot");
        }, 500);
    </script>
</body>
</html>
