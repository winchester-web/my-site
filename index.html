<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>YSN Brand</title>

<style>
body {
margin: 0;
font-family: Arial;
background: black;
color: white;
}

header {
display: flex;
justify-content: space-between;
padding: 20px;
}

.logo {
font-size: 24px;
font-weight: bold;
}

.hero {
height: 90vh;
display: flex;
justify-content: center;
align-items: center;
flex-direction: column;
text-align: center;
}

.hero h1 {
font-size: 50px;
}

.hero p {
color: gray;
}

.btn {
margin-top: 20px;
padding: 12px 30px;
background: white;
color: black;
border-radius: 30px;
text-decoration: none;
}

.products {
padding: 50px;
display: flex;
justify-content: center;
gap: 30px;
}

.card {
background: #111;
padding: 20px;
border-radius: 15px;
width: 220px;
text-align: center;
transition: 0.3s;
}

.card:hover {
transform: scale(1.05);
}

.card img {
width: 100%;
border-radius: 10px;
}

footer {
text-align: center;
padding: 20px;
color: gray;
}
</style>
</head>

<body>

<header>
<div class="logo">YSN 🔥</div>
<div>Streetwear</div>
</header>

<section class="hero">
<h1>Level Up Your Style</h1>
<p>Simple. Clean. Powerful.</p>
<a href="#" class="btn">Shop Now</a>
</section>

<section class="products">

<div class="card">
<img src="https://via.placeholder.com/200">
<h3>Black Tee</h3>
<p>50 DT</p>
</div>

<div class="card">
<img src="https://via.placeholder.com/200">
<h3>White Tee</h3>
<p>50 DT</p>
</div>

</section>

<footer>
<p>© 2026 YSN Brand</p>
</footer>

</body>
</html>
