<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Twin Star</title>

<style>
body {
margin: 0;
font-family: Arial;
background: black;
color: white;
overflow-x: hidden;
}
html{
  scroll-behavior:smooth;
}
/* Stars background */
.stars {
position: fixed;
width: 100%;
height: 100%;
background: url('https://www.transparenttextures.com/patterns/stardust.png');
animation: moveStars 50s linear infinite;
z-index: -1;
}

@keyframes moveStars {
from {background-position: 0 0;}
to {background-position: 1000px 1000px;}
}

/* Hero */
.hero {
height: 100vh;
display: flex;
justify-content: center;
align-items: center;
flex-direction: column;
text-align: center;
}

.hero h1 {
font-size: 60px;
letter-spacing: 3px;
animation: glow 2s infinite alternate;
}

@keyframes glow {
from {text-shadow: 0 0 10px white;}
to {text-shadow: 0 0 30px white;}
}

.hero p {
color: gray;
}

.btn {
margin-top: 20px;
padding: 12px 30px;
background: white;
color: black;
border-radius: 30px;
text-decoration: none;
transition: 0.3s;
}

.btn:hover {
transform: scale(1.1);
}

/* Products */
.products {
padding: 50px;
display: flex;
justify-content: center;
gap: 30px;
}

.card {
background: #111;
padding: 20px;
border-radius: 15px;
width: 220px;
text-align: center;
transition: 0.4s;
}

.card:hover {
transform: translateY(-10px) scale(1.05);
}

.card img {
width: 100%;
border-radius: 10px;
}

footer {
text-align: center;
padding: 20px;
color: gray;
}
</style>
</head>

<body>

<div class="stars"></div>

<section class="hero">
<h1>TWIN STAR ✨</h1>
<p>Shine Different. Shine Strong.</p>
<a href="#products" class="btn">Explore</a>
</section>

<section class="products" id="products">
<div class="card">
<img src="https://via.placeholder.com/200">
<h3>Black Tee</h3>
<p>50 DT</p>
</div>

<div class="card">
<img src="https://via.placeholder.com/200">
<h3>White Tee</h3>
<p>50 DT</p>
</div>
</section>

<footer>
<p>© 2026 Twin Star</p>
</footer>

</body>
</html>
