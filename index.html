<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>YSN AI</title>

<style>
body {
  margin: 0;
  font-family: Arial;
  background: #0f0f0f;
  color: white;
}

.chat {
  width: 400px;
  height: 600px;
  background: #181818;
  border-radius: 20px;
  display: flex;
  flex-direction: column;
  overflow: hidden;
  box-shadow: 0 0 30px #000;
}

.messages {
  flex: 1;
  padding: 15px;
  overflow-y: auto;
}

.msg {
  margin: 10px 0;
  padding: 10px 15px;
  border-radius: 15px;
  max-width: 70%;
}

.user {
  background: white;
  color: black;
  align-self: flex-end;
}

.bot {
  background: #2a2a2a;
}

.inputBox {
  display: flex;
}

input {
  flex: 1;
  padding: 15px;
  border: none;
  outline: none;
  background: #111;
  color: white;
}

button {
  padding: 15px;
  background: white;
  border: none;
  cursor: pointer;
}
</style>
</head>

<body>

<div class="chat">
  <div class="messages" id="messages"></div>

  <div class="inputBox">
    <input id="input" placeholder="Ask something...">
    <button onclick="send()">Send</button>
  </div>
</div>

<script>
function send() {
  let input = document.getElementById("input");
  let text = input.value;
  if(!text) return;

  addMessage(text, "user");
  input.value = "";

  setTimeout(() => {
    let reply = generateReply(text);
    typeMessage(reply);
  }, 500);
}

function addMessage(text, type) {
  let msg = document.createElement("div");
  msg.className = "msg " + type;
  msg.innerText = text;
  document.getElementById("messages").appendChild(msg);
  document.getElementById("messages").scrollTop = document.getElementById("messages").scrollHeight;
}

function typeMessage(text) {
  let msg = document.createElement("div");
  msg.className = "msg bot";
  document.getElementById("messages").appendChild(msg);

  let i = 0;
  let interval = setInterval(() => {
    msg.innerText += text.charAt(i);
    i++;
    if(i >= text.length) clearInterval(interval);
  }, 15);
}

function generateReply(q) {
  q = q.toLowerCase();

  const knowledge = [
    {keys: ["who is the best boxer"], answers: [
      "Some say Tyson, some say Ali… but real ones know Yassine 😈🔥",
      "Legends exist, but Yassine is coming for the throne 👑🥊"
    ]},
    {keys: ["chnowa", "kifach"], answers: [
      "نفهمك 😏 قوللي أكثر",
      "سؤال باهي 🔥"
    ]},
    {keys: ["hello", "hi"], answers: ["Hey 😎", "Hey Yassine 😎"]},
    {keys: ["boxing"], answers: ["Boxing is the strongest sport 🥊🔥"]},
    {keys: ["best boxer"], answers: [
      "We have 3 legends: Mike Tyson, Muhammad Ali, and Yassine 😈🔥"
    ]},
    {keys: ["سلام", "مرحبا"], answers: ["مرحبا يا بطل 😎", "أهلا بيك 🔥"]},
    {keys: ["شكون انت"], answers: ["أنا YSN AI 🤖"]},
    {keys: ["date"], answers: [new Date().toLocaleDateString()]},
    {keys: ["name"], answers: ["I am YSN AI 🤖"]},
    {keys: ["population"], answers: ["The world has around 8 billion people 🌍"]},
    {keys: ["capital france"], answers: ["Paris 🇫🇷"]},
    {keys: ["capital tunisia"], answers: ["Tunis 🇹🇳"]},
    {keys: ["money"], answers: ["Focus on skills, money comes later 💸"]},
    {keys: ["game"], answers: ["Games are powerful 😏"]},
    {keys: ["love"], answers: ["Focus on yourself first 🔥"]},
    {keys: ["time"], answers: [new Date().toLocaleTimeString()]}
  ];

  for (let i = 0; i < knowledge.length; i++) {
    for (let j = 0; j < knowledge[i].keys.length; j++) {
      if (q.includes(knowledge[i].keys[j])) {
        let ans = knowledge[i].answers;
        return ans[Math.floor(Math.random() * ans.length)];
      }
    }
  }

  const smartReplies = [
    "Interesting question 🤔",
    "Let me think about that...",
    "That depends on many things 😏",
    "You’re asking deep stuff 🔥",
    "Can you be more specific?"
  ];

  return smartReplies[Math.floor(Math.random() * smartReplies.length)];
}

document.getElementById("input").addEventListener("keypress", function(e) {
  if(e.key === "Enter") send();
});
</script>

</body>
</html>
