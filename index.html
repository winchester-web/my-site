<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>My Brand</title>

<style>
body {
margin: 0;
font-family: Arial;
background: #0f0f0f;
color: white;
}

header {
display: flex;
justify-content: space-between;
padding: 20px;
background: black;
}

header h1 {
margin: 0;
}

.hero {
text-align: center;
padding: 100px 20px;
}

.hero h2 {
font-size: 40px;
}

.btn {
padding: 10px 25px;
background: white;
color: black;
border-radius: 20px;
text-decoration: none;
display: inline-block;
margin-top: 20px;
}

.products {
display: flex;
justify-content: center;
gap: 20px;
padding: 50px;
flex-wrap: wrap;
}

.card {
background: #1a1a1a;
padding: 20px;
border-radius: 10px;
width: 200px;
text-align: center;
}

.card img {
width: 100%;
border-radius: 10px;
}

footer {
text-align: center;
padding: 20px;
background: black;
margin-top: 50px;
color: #aaa;
}
</style>
</head>

<body>

<header>
<h1>My Brand 🔥</h1>
<p>Streetwear</p>
</header>

<section class="hero">
<h2>Welcome to my brand</h2>
<p>Best style ever 😎</p>
<a href="#" class="btn">Shop Now</a>
</section>

<section class="products">

<div class="card">
<img src="https://via.placeholder.com/200">
<h3>T-Shirt Black</h3>
<p>50 DT</p>
</div>

<div class="card">
<img src="https://via.placeholder.com/200">
<h3>T-Shirt White</h3>
<p>50 DT</p>
</div>

</section>

<footer>
<p>© 2026 My Brand</p>
</footer>

</body>
</html>
