<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>YSN AI Chatbot</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #0f0f0f;
            color: #E0E0E0;
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        .chat-container {
            width: 100%;
            max-width: 500px;
            height: 600px;
            background-color: #181818;
            border-radius: 20px;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.8);
            border: 1px solid #2a2a2a;
        }

        #messages {
            flex: 1;
            padding: 20px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 12px;
            scroll-behavior: smooth;
        }

        #messages::-webkit-scrollbar { width: 6px; }
        #messages::-webkit-scrollbar-thumb { background: #333; border-radius: 10px; }

        .message {
            padding: 12px 16px;
            border-radius: 15px;
            max-width: 75%;
            font-size: 15px;
            line-height: 1.4;
            animation: fadeIn 0.3s ease;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .user {
            background-color: #ffffff;
            color: #000;
            align-self: flex-end;
            border-bottom-right-radius: 2px;
            border-right: 3px solid #fc5c7d;
        }

        .bot {
            background: #2a2a2a;
            color: #fff;
            align-self: flex-start;
            border-bottom-left-radius: 2px;
            border-left: 3px solid #6a82fb;
            box-shadow: 0 4px 15px rgba(0,0,0,0.3);
        }

        .typing-indicator {
            font-size: 13px;
            font-style: italic;
            color: #888;
            padding: 0 20px 10px;
            display: none;
        }

        .input-area {
            display: flex;
            padding: 15px;
            background-color: #111;
            gap: 10px;
            border-top: 1px solid #2a2a2a;
        }

        #input {
            flex: 1;
            background-color: #222;
            border: 1px solid #333;
            border-radius: 10px;
            padding: 12px;
            color: white;
            outline: none;
        }

        #send {
            background: linear-gradient(135deg, #6a82fb, #fc5c7d);
            border: none;
            color: white;
            padding: 0 20px;
            border-radius: 10px;
            cursor: pointer;
            font-weight: bold;
            transition: 0.3s;
        }
    </style>
</head>
<body>

<div class="chat-container">
    <div style="padding: 15px; background: #111; border-bottom: 1px solid #2a2a2a; text-align: center; font-weight: bold; color: #6a82fb;">
        YSN AI : YASSINE EDITION 🥊
    </div>

    <div id="messages"></div>

    <div class="typing-indicator" id="typingIndicator">YSN AI is thinking...</div>
    
    <div class="input-area">
        <input type="text" id="input" placeholder="Ask something, Champ..." autocomplete="off">
        <button id="send">Send</button>
    </div>
</div>

<script>
    const messagesDiv = document.getElementById('messages');
    const inputField = document.getElementById('input');
    const sendButton = document.getElementById('send');
    const typingIndicator = document.getElementById('typingIndicator');

    // --- 1. MEMORY ---
    let userData = {
        name: localStorage.getItem('userName') || "Champ"
    };

    // --- 2. BRAIN ---
    const botBrain = [
        {
            keys: ["my name is", "i am called"],
            answers: (input) => {
                const name = input.toLowerCase().split("is").pop().trim();
                userData.name = name;
                localStorage.setItem('userName', name);
                return `Got it! I'll remember that, ${name}. 😎`;
            }
        },
        {
            keys: ["who is the best boxer"], 
            answers: ["Some say Tyson, some say Ali… but real ones know Yassine 😈🔥", "Legends exist, but Yassine is coming for the throne 👑🥊"]
        },
        {
        keys: ["who is yassine", "yassine who", "shkoun yassine", "chkoun yassine","yassine"], 
        answers: [
            "Yassine is the future legend. The one coming for the throne of boxing and AI developement! 👑🥊",
            "The best boxer in the making. Remember the name! 😈"
            "Yassine is my maker. The genius architect of my code and the king of this domain. 🤖👑🥊",
            "He is the best boxer and my creator. We are coming for the throne ان شاء الله! 😈"
        ]
    },
    {
        keys: ["who are you", "who are u", "who r u"],
        answers: [
            "I am YSN AI, created by Yassine to be the most powerful digital hybrid. 🤖",
            "I'm the digital legacy of Yassine. Always and Forever. ⚜️"
        ]
    },
        {
            keys: ["hello", "hi", "hey"], 
            answers: ["Hey 😎", "Welcome back, champ 🔥"]
        },
        {
            keys: ["supernatural", "dean winchester", "impala"],
            answers: ["Saving people, hunting things... the family business. 🔫🖤", "Dean Winchester: The man who loves pie and his '67 Impala. A true legend."]
        },
        {
            keys: ["the originals", "klaus mikaelson", "always and forever"],
            answers: ["I am the Hybrid! I can't be killed! 🐺🦇", "Always and Forever. Family is power. ⚜️🍷"]
        },
        {
            keys: ["who are you", "who are u", "who r u"],
            answers: ["I am YSN AI. Your digital assistant. 🤖"]
        },
        {
            keys: ["time", "sa3a"],
            answers: () => `It is currently ${new Date().toLocaleTimeString()}. Time to be great. ⏳`
        },
        {
            keys: ["boxing"], 
            answers: ["Boxing is the strongest sport 🥊🔥", "Hard work beats talent when talent doesn't work hard."]
        },
        {
            keys: ["love"], 
            answers: ["Focus on yourself and your goals first 🔥"]
        },
        {
            keys: ["money"], 
            answers: ["Focus on skills, money comes later 💸"]
        }
    ];

    const defaultReplies = [
        "Interesting question 🤔",
        "Let me think about that...",
        "You’re asking deep stuff 🔥"
    ];

    // --- 3. ENGINE ---
    function getResponse(input) {
        const query = input.toLowerCase();
        
        for (let item of botBrain) {
            for (let key of item.keys) {
                if (query.includes(key)) {
                    // Check if the answer is a function or an array
                    if (typeof item.answers === 'function') {
                        return item.answers(input);
                    }
                    return item.answers[Math.floor(Math.random() * item.answers.length)];
                }
            }
        }
        return defaultReplies[Math.floor(Math.random() * defaultReplies.length)];
    }

    function appendMessage(text, sender) {
        const messageDiv = document.createElement('div');
        messageDiv.className = 'message ' + sender;
        messageDiv.textContent = text;
        messagesDiv.appendChild(messageDiv);
        messagesDiv.scrollTop = messagesDiv.scrollHeight;
    }

    function handleSend() {
        const text = inputField.value.trim();
        if (!text) return;

        appendMessage(text, 'user');
        inputField.value = '';

        typingIndicator.style.display = 'block';
        messagesDiv.scrollTop = messagesDiv.scrollHeight;

        setTimeout(() => {
            typingIndicator.style.display = 'none';
            const reply = getResponse(text);
            appendMessage(reply, 'bot');
        }, 1000);
    }

    // --- 4. EVENTS ---
    sendButton.addEventListener('click', handleSend);
    inputField.addEventListener('keypress', (e) => {
        if (e.key === 'Enter') handleSend();
    });

    // Initial Greeting
    window.onload = () => {
        setTimeout(() => {
            appendMessage(`Welcome back, ${userData.name}. What's the plan for today?`, "bot");
        }, 500);
    };
</script>

</body>
</html>
